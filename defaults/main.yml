---
# Home Assistant connection settings
# These should be overridden in group_vars or host_vars
homeassistant:
  host: "{{ ansible_host | default('homeassistant.local') }}"
  port: 8123
  tls: false
  ssl_verify: false
  # access_token should be set via vault
  # access_token: ""

# Python dependencies for HA API modules
homeassistant_pip_packages:
  - websocket-client
  - requests

# Virtualenv for HA API dependencies (on the controller)
homeassistant_venv_path: "{{ role_path }}/.venv"
